<div class="p-4 md:p-6 lg:p-8" style="background: var(--p-surface-50); min-height: 90vh;">
    <div class="max-w-screen-xl mx-auto">
        
        <p-panel>
            <!-- Header Panelu -->
            <ng-template pTemplate="header">
                <div class="flex align-items-center gap-3">
                    <i class="pi pi-map-marker text-primary text-2xl"></i>
                    <span class="font-bold text-xl">Geografický přehled</span>
                </div>
            </ng-template>

            <div class="grid p-2">
                <!-- Levý panel: Instrukce -->
                <div class="col-12 lg:col-4 border-right-1 surface-border pr-4">
                    <h2 class="text-3xl font-black mt-0 mb-3">Analýza krajů</h2>
                    <p class="text-secondary line-height-3 mb-4">
                        Interaktivní distribuce přihlášek. Klikněte na konkrétní oblast mapy pro hloubkovou analýzu škol a oborů v daném regionu.
                    </p>

                    <p-divider></p-divider>

                    <div class="flex flex-column gap-4 mt-4">
                        <div class="flex align-items-center gap-3">
                            <i class="pi pi-mouse text-primary"></i>
                            <span class="text-sm font-medium">Interaktivní výběr regionu</span>
                        </div>
                        <div class="flex align-items-center gap-3">
                            <i class="pi pi-chart-bar text-primary"></i>
                            <span class="text-sm font-medium">Okamžitý přehled statistik</span>
                        </div>
                        <div class="flex align-items-center gap-3">
                            <i class="pi pi-list text-primary"></i>
                            <span class="text-sm font-medium">Seznam škol v lokalitě</span>
                        </div>
                    </div>
                </div>

                <!-- Pravý panel: Mapa -->
                <div class="col-12 lg:col-8 p-0 md:pl-6 flex align-items-center justify-content-center" style="min-height: 450px;">
                    <div class="w-full">
                        <app-region-map></app-region-map>
                    </div>
                </div>
            </div>

            <!-- Footer Panelu: Status bar -->
            <ng-template pTemplate="footer">
                <div class="flex justify-content-between align-items-center text-xs text-secondary uppercase tracking-wider">
                    <span>Režim prohlížení: Celá ČR</span>
                    <span class="flex align-items-center gap-2">
                        <i class="pi pi-circle-fill text-green-500" style="font-size: 0.5rem"></i>
                        Databáze připojena
                    </span>
                </div>
            </ng-template>
        </p-panel>

    </div>
</div>
