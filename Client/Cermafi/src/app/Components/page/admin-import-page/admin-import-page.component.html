<div class="admin-container p-4">
  <p-card header="Data Importer" subheader="Upload Cermat Excel files to PostgreSQL">
    
    <div class="flex align-items-center gap-3 mb-4 p-3 border-round bg-muted">
      <p-inputSwitch [(ngModel)]="isWiping" inputId="append-toggle"></p-inputSwitch>  
      @if (isWiping){
        <p-tag severity="danger" value="REPLACE MODE" pTooltip="WARNING: Will delete already existing data / Smaže už existující data"></p-tag>
      } @else {
        <p-tag severity="info" value="APPEND MODE"></p-tag>
      }
      
    </div>

    <p-fileUpload 
      name="file" 
      [url]="uploadUrl"
      accept=".xlsx,.xls" 
      [multiple]="true" 
      maxFileSize="50000000"
      (onBeforeSend)="onStartUpload($event)"
      (onUpload)="onUploadSuccess($event)"
      (onError)="onUploadError($event)"
      chooseLabel="Select Excel Files"
      uploadLabel="Run Import Script"
      [disabled]="isImporting">
      
      <ng-template pTemplate="content">
        @if (importLogs.length>0) {
          <ul class="log-list">
           @for (log of importLogs; track $index) {
            <li >{{ log }}</li>
           }
          
        </ul>
        }
        
      </ng-template>
    </p-fileUpload>
@if (isImporting) {
  <p-progressBar mode="indeterminate" [style]="{'height': '6px'}" class="mt-3"></p-progressBar>
}
    
  </p-card>

  <p-card>
    <div class="card-label">Termín přijímacích zkoušek</div>

    <div class="form-group">
        <label class="form-label">Datum termínu</label>
        <input
            type="date"
            class="form-input"
            [(ngModel)]="targetDate" />
    </div>

    <div style="display: flex; gap: 8px; margin-top: 0.5rem;">
        <button class="btn btn-primary" 
            style="flex: 1;"
            (click)="saveDate()" 
            [disabled]="savingDate || !targetDate">
            {{ savingDate ? 'Ukládám...' : 'Uložit datum' }}
        </button>
        <button class="btn btn-ghost btn-sm"
            (click)="clearDate()"
            [disabled]="savingDate || !targetDate">
            <i class="pi pi-times"></i>
            Vymazat
        </button>
    </div>

    @if (dateMessage) {
        <p style="font-size: 12px; margin-top: 0.5rem;"
           [style.color]="dateMessage === 'Uloženo' ? 'var(--p-green-600)' : 'var(--p-red-500)'">
            {{ dateMessage }}
        </p>
    }
  </p-card>
</div>
