<div class="simple-graph">
        <h3>Porovnání počtu uchazečů — 2024 vs 2025</h3>
        <div class="card">
        <p-chart 
            type="line" 
            [data]="chartData" 
            [options]="chartOptions" 
        />
        </div>

        <ng-template #loading>
                <p>Načítám graf…</p>
        </ng-template>
</div>
