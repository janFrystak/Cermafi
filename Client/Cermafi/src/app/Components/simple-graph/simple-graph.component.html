<div class="simple-graph">
        <h3>Porovnání počtu uchazečů — 2024 vs 2025</h3>
        <div *ngIf="chartData.datasets.length; else loading">
                <canvas
                        baseChart
                        [data]="chartData"
                        [type]="'line'"
                        [options]="chartOptions"
                ></canvas>
        </div>

        <ng-template #loading>
                <p>Načítám graf…</p>
        </ng-template>
</div>
